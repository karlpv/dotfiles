# Minimal, cross-platform tmux config.
# Keep tmux visuals terminal-driven (no green status bar).

# Prefix: C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,kitty:RGB,ghostty:RGB,*256col*:RGB"

# Core
set -g mouse on
set -g history-limit 100000
set -s escape-time 1
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-clipboard on

# Splits / windows / panes
unbind |
unbind -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r C-h previous-window
bind -r C-l next-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# Copy mode (vi) + clipboard (pbcopy/wl-copy/xclip)
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "bash -lc '
  if command -v pbcopy >/dev/null 2>&1; then cat | pbcopy;
  elif command -v wl-copy >/dev/null 2>&1; then cat | wl-copy;
  elif command -v xclip  >/dev/null 2>&1; then cat | xclip -selection clipboard;
  else tmux load-buffer - && tmux display-message "(No clipboard tool)";
  fi'"

# Minimal colors: follow terminal theme
set -g status-style "bg=default,fg=default"
set -g message-style "bg=default,fg=default"
set -g mode-style "bg=default,fg=default"
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=default"
set -gu status-left
set -gu status-left-length
setw -gu window-status-format
setw -gu window-status-current-format
set -g status-right-length 58
set -g status-right "#{?client_prefix,#[fg=colour240]^A#[default],  } \"#{=30:pane_title}\" %d-%b"
